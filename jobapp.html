<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">

    <style>
        body {
            background-color: rgb(229, 245, 177);
        }

        h1 {
            color: rgb(163, 9, 15);
            margin-top: 20px;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
        }

        .form-control {
            border-radius: 8px;
        }

        .btn {
            border-radius: 8px;
        }
    </style>

</head>

<body>

    <h1 class="text-center">Application Form</h1>

    <div class="container">

        <div class="row">

            <div class="col col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12">

                <div class="row g-4">

                    <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
                        <label class="form-label">Applicant Name</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
                        <label class="form-label">Company Name</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
                        <label class="form-label">Job Role / Title</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
                        <label class="form-label">Job Location</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
                        <label class="form-label">Application Date</label>
                        <input type="date" class="form-control">
                    </div>

                    <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
                        <label class="form-label">Application Source</label>
                        <select class="form-control">
                            <option selected>--Select--</option>
                            <option>LinkedIn</option>
                            <option>Referral</option>
                            <option>Company Website</option>
                            <option>Indeed</option>
                        </select>
                    </div>

                    <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
                        <label class="form-label d-block">Application Status</label>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="status">
                            <label class="form-check-label">Applied</label>
                        </div>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="status">
                            <label class="form-check-label">Interview</label>
                        </div>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="status">
                            <label class="form-check-label">Offer</label>
                        </div>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="status">
                            <label class="form-check-label">Rejected</label>
                        </div>
                    </div>

                    <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
                        <label class="form-label">Resume / CV Link</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
                        <label class="form-label">Recruiter Name</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
                        <label class="form-label">Recruiter Contact Email</label>
                        <input type="email" class="form-control">
                    </div>

                    <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
                        <label class="form-label">Applicant Image URL</label>
                        <input type="text" class="form-control"
                            onkeyup="document.getElementById('preview').src=this.value">
                    </div>

                    <div class="col col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12 text-center">
                        <img id="preview"
                            src="https://via.placeholder.com/150"
                            class="img-thumbnail"
                            width="150">
                    </div>

                    <div class="col col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12">
                        <label class="form-label">Notes / Remarks</label>
                        <textarea class="form-control" rows="4"></textarea>
                    </div>

                </div>

                <div class="text-center mt-5">
                    <button class="btn btn-success px-5">Submit</button>
                </div>

                <div class="text-center mt-3">
                    <a href="jobapp2.html" class="btn btn-primary px-5">Preview</a>
                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
