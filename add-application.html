<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Application</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background-color:aliceblue;">

<h1 class="text-center mt-4 mb-5">JOB APPLICATION TRACKER</h1>

<div class="container">

<div class="row">

<div class="col-12">

<div class="row g-4">

<div class="col-12 col-md-6">
<label class="form-label">Applicant Name</label>
<input type="text" class="form-control">
</div>

<div class="col-12 col-md-6">
<label class="form-label">Company Name</label>
<input type="text" class="form-control">
</div>

<div class="col-12 col-md-6">
<label class="form-label">Job Role / Title</label>
<input type="text" class="form-control">
</div>

<div class="col-12 col-md-6">
<label class="form-label">Job Location</label>
<input type="text" class="form-control">
</div>

<div class="col-12 col-md-6">
<label class="form-label">Application Date</label>
<input type="date" class="form-control">
</div>

<div class="col-12 col-md-6">
<label class="form-label">Application Source</label>

<select class="form-control">
<option>--Select--</option>
<option>LinkedIn</option>
<option>Referral</option>
<option>Company Website</option>
<option>Indeed</option>
</select>

</div>

<div class="col-12 col-md-6">
<label class="form-label">Application Status</label>

<select class="form-control">
<option>Applied</option>
<option>Interview</option>
<option>Offer</option>
<option>Rejected</option>
</select>

</div>

<div class="col-12 col-md-6">
<label class="form-label">Resume / CV Link</label>
<input type="text" class="form-control">
</div>

<div class="col-12 col-md-6">
<label class="form-label">Recruiter Name</label>
<input type="text" class="form-control">
</div>

<div class="col-12 col-md-6">
<label class="form-label">Recruiter Contact Email</label>
<input type="email" class="form-control">
</div>

<div class="col-12">
<label class="form-label">Applicant Image URL</label>

<input
type="text"
class="form-control"
placeholder="Paste Image URL"
onkeyup="document.getElementById('preview').src=this.value">

<br>

<img
id="preview"
src="https://via.placeholder.com/150"
class="img-thumbnail"
width="150">

</div>

<div class="col-12">
<label class="form-label">Notes / Remarks</label>

<textarea class="form-control" rows="4"></textarea>

</div>

</div>

<a href="view-applications.html" class="btn btn-primary mt-4">
Submit
</a>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
