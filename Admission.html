<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Admission Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">
</head>

<body style="background-color: bisque;">

    <h1 class="text-center my-5">STUDENT ADMISSION FORM</h1>

    <div class="container">

        <div class="row">
            <div class="col-12">

                <div class="row g-4">

                    
                    <div class="col-12 col-md-6">
                        <label class="form-label">Application ID</label>
                        <input type="number" class="form-control">
                    </div>

                    
                    <div class="col-12 col-md-6">
                        <label class="form-label">Student First Name</label>
                        <input type="text" class="form-control">
                    </div>

                    
                    <div class="col-12 col-md-6">
                        <label class="form-label">Student Last Name</label>
                        <input type="text" class="form-control">
                    </div>

                    
                    <div class="col-12 col-md-6">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" class="form-control">
                    </div>

                    
                    <div class="col-12 col-md-6">
                        <label class="form-label">Gender</label>
                        <select class="form-select">
                            <option selected>--Select--</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>

                  
                    <div class="col-12 col-md-6">
                        <label class="form-label">Course Applied For</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                            <label class="form-check-label" for="checkDefault">
                              PYTHON
                            </label>
                          </div>
                          <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="checkChecked" checked>
                            <label class="form-check-label" for="checkChecked">
                              JAVA
                            </label>
                          </div>
                          <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="checkChecked" checked>
                            <label class="form-check-label" for="checkChecked">
                              C++
                            </label>
                          </div>

                    </div>

                    
                    <div class="col-12 col-md-6">
                        <label class="form-label">Previous School/College Name</label>
                        <input type="text" class="form-control">
                    </div>

                   
                    <div class="col-12 col-md-6">
                        <label class="form-label">Previous Qualification Percentage/CGPA</label>
                        <input type="text" class="form-control">
                    </div>

                    
                    <div class="col-12 col-md-6">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control">
                    </div>

                    
                    <div class="col-12 col-md-6">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-control">
                    </div>

                  
                    <div class="col-12 col-md-6">
                        <label class="form-label">Father's Name</label>
                        <input type="text" class="form-control">
                    </div>

                   
                    <div class="col-12 col-md-6">
                        <label class="form-label">Mother's Name</label>
                        <input type="text" class="form-control">
                    </div>

                    
                    <div class="col-12 col-md-6">
                        <label class="form-label">Guardian Contact Number</label>
                        <input type="tel" class="form-control">
                    </div>

                   
                    <div class="col-12 col-md-6">
                        <label class="form-label">Address Line 1</label>
                        <input type="text" class="form-control">
                    </div>

                    
                    <div class="col-12 col-md-6">
                        <label class="form-label">City</label>
                        <input type="text" class="form-control">
                    </div>

                    
                    <div class="col-12 col-md-6">
                        <label class="form-label">State</label>
                        <select class="form-select">
                            <option selected>--Select--</option>
                            <option>Kerala</option>
                            <option>Karnataka</option>
                            <option>Tamil Nadu</option>
                        </select>
                    </div>

                   
                    <div class="col-12 col-md-6">
                        <label class="form-label">Country</label>
                        <input type="text" class="form-control">
                    </div>

                    
                    <div class="col-12 col-md-6">
                        <label class="form-label">Postal Code</label>
                        <input type="number" class="form-control">
                    </div>

                </div>

                
                <div class="text-center mt-5 mb-4">
                    <button class="btn btn-success px-5">Submit</button>
                </div>

            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>
</html>
